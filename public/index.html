<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Véradási Helyszínek</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .custom-div-icon {
            background: none;
            border: none;
        }

        .marker-pin {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            border: 2px solid white;
        }

        .marker-pin i {
            z-index: 10;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="locations.js"></script>

    <script>
        // Initialize the map
        const map = L.map('map').setView([47.1625, 19.5033], 8); // Center of Hungary

        // Add OpenStreetMap tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Custom icon function
        function createCustomIcon(isFixed) {
            const color = isFixed ? "#7f8c8d" : "#c0392b";
            const iconClass = isFixed ? "fa-solid fa-hospital" : "fa-solid fa-ambulance";
            return L.divIcon({
                className: 'custom-div-icon',
                html: `<div class='marker-pin' style='background-color: ${color};'><i class='${iconClass}' style='color: white;'></i></div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });
        }

        LOCATIONS.forEach(point => {
            const marker = L.marker(point.coords, {
                icon: createCustomIcon(point.is_fixed_location)
            }).addTo(map);

            const popupContent = `
                        <div style="font-family: sans-serif;">
                            <h3 style="margin: 0 0 5px 0; font-size: 16px;">${point.name}</h3>
                            <p style="margin: 0 0 10px 0; font-size: 13px; color: #666;">${point.address}</p>
                            <div style="font-size: 12px;">
                                <strong>Időpontok:</strong><br>
                                ${point.appointments.slice(0, 3).map(app => `
                                    <div style="margin-top: 5px; border-top: 1px solid #eee; padding-top: 3px;">
                                        ${app.date}: ${app.start}-${app.end}
                                    </div>
                                `).join('')}
                                ${point.appointments.length > 3 ? '<div style="margin-top: 3px; font-style: italic;">...további időpontok a weboldalon</div>' : ''}
                            </div>
                        </div>
                    `;

            marker.bindPopup(popupContent);
        });

    </script>

</body>

</html>
